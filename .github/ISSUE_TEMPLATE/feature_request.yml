name: Feature request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Please keep proposals within the project's **authorized-use** scope —
        detection and assessment of *exposed* keys for security research. Features
        whose primary purpose is unauthorized exploitation will be declined.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to accomplish? What's missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should the extension do? Which surface (detection, audit, dashboard, export)?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered (optional)
  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: This request is for defensive / authorized security-research use.
          required: true
