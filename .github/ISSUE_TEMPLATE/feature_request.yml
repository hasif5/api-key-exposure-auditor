name: Feature request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Please keep proposals within the project's scope — helping developers
        detect and fix API keys exposed in their own projects.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to accomplish? What's missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should the extension do? Which surface (detection, audit, dashboard, export)?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered (optional)
  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: This request helps developers secure their own projects.
          required: true
